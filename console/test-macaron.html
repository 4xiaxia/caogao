<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/copaw-symbol.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoPaw Console - 夏夏的 zo</title>
    <style>
      body {
        background: linear-gradient(135deg, #FDFBF0 0%, #F9F6E8 100%);
        font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        padding: 24px;
      }
      .test-card {
        background: #FFF9F0;
        border: 2px solid #E8D8B8;
        border-radius: 20px;
        padding: 24px;
        margin: 20px 0;
        box-shadow: 0 8px 24px rgba(177, 156, 217, 0.15);
      }
      .test-button {
        background: linear-gradient(180deg, #B19CD9 0%, #9A82C4 100%);
        color: white;
        border: none;
        border-radius: 24px;
        padding: 12px 24px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(177, 156, 217, 0.3);
      }
      .test-tag {
        background: #BCE6C9;
        color: #5A8C6E;
        padding: 6px 14px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 13px;
        display: inline-block;
      }
      h1 {
        color: #B19CD9;
        font-size: 28px;
      }
    </style>
  </head>
  <body>
    <h1>🤖 夏夏的 zo - 纯 CSS 测试</h1>
    
    <div class="test-card">
      <h2>✅ 马卡龙主题测试</h2>
      <p>这是用纯 CSS 实现的马卡龙风格，不依赖 Naive UI</p>
      <button class="test-button">马卡龙按钮</button>
      <span class="test-tag">运行中</span>
    </div>
    
    <div class="test-card">
      <h2>📊 状态</h2>
      <p>如果看到这个页面，说明马卡龙配色正常！</p>
      <p>Naive UI 的问题正在修复中...</p>
    </div>
  </body>
</html>
